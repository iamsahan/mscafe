<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1E40AF"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#gradient)"/>
  
  <!-- Main content -->
  <circle cx="600" cy="315" r="120" fill="#ffffff" fill-opacity="0.1"/>
  <text x="600" y="350" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="80" font-weight="bold">MSG</text>
  <text x="600" y="400" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="32">Tax Services</text>
  <text x="600" y="450" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24">Professional Tax & Financial Services</text>
</svg>
