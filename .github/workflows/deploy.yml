name: Deploy to Hostinger VPS with Nginx

on:
  push:
    branches:
      - prod
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            Frontend/package-lock.json
            backend/package-lock.json

      - name: Build Frontend
        working-directory: Frontend
        run: |
          npm ci
          npm run build

      - name: Install Backend Dependencies
        working-directory: backend
        run: |
          npm ci --production

      - name: Create Deployment Package
        run: |
          mkdir -p deploy/app
          cp -r Frontend/build deploy/app/frontend
          rsync -av --exclude='node_modules' --exclude='logs' --exclude='uploads' --exclude='.env' backend/ deploy/app/backend/
          mkdir -p deploy/app/backend/logs
          mkdir -p deploy/app/backend/uploads/images/courses
          mkdir -p deploy/app/backend/uploads/images/services
          cp backend/package*.json deploy/app/backend/

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT || 22 }}
          source: "deploy/*"
          target: "/tmp/"
          strip_components: 1
          overwrite: true

      - name: Setup Application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT || 22 }}
          script: |
            echo "Starting deployment..."

            # Install Node.js if needed
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | echo "${{ secrets.HOSTINGER_PASSWORD }}" | sudo -S bash -
              echo "${{ secrets.HOSTINGER_PASSWORD }}" | sudo -S apt-get install -y nodejs
            fi

            # Install PM2 globally
            echo "${{ secrets.HOSTINGER_PASSWORD }}" | sudo -S npm install -g pm2

            # Stop existing app
            pm2 stop mscafe-app || true
            pm2 delete mscafe-app || true

            # Backup current app
            if [ -d ~/mscafe ]; then
              rm -rf ~/mscafe_backup
              mv ~/mscafe ~/mscafe_backup
            fi

            # Create application directory
            mkdir -p ~/mscafe

            # Move files from tmp to home directory
            if [ -d /tmp/app ]; then
              cp -r /tmp/app/* ~/mscafe/
              rm -rf /tmp/app
            fi

            # Set proper permissions
            chmod -R 755 ~/mscafe

            # Install production dependencies
            cd ~/mscafe/backend
            npm install --production

            # Copy environment file if exists
            if [ -f ~/mscafe_backup/backend/.env ]; then
              cp ~/mscafe_backup/backend/.env .
            fi

            # Start app with PM2
            pm2 start server.js --name mscafe-app
            pm2 save
            pm2 startup

            # Install nginx if not present
            if ! command -v nginx &> /dev/null; then
                echo "Installing nginx..."
                export DEBIAN_FRONTEND=noninteractive
                echo "${{ secrets.HOSTINGER_PASSWORD }}" | sudo -S apt update
                echo "${{ secrets.HOSTINGER_PASSWORD }}" | sudo -S apt install -y nginx
            fi

            # Create nginx configuration directory in user space first
            mkdir -p ~/nginx-config

            # Create nginx configuration file
            cat > ~/nginx-config/mscafe.conf <<'EOF'
            server {
                listen 80;
                listen [::]:80;
                server_name _;
                
                # Security headers
                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-XSS-Protection "1; mode=block" always;
                add_header X-Content-Type-Options "nosniff" always;
                
                # Serve React frontend
                location / {
                    root /home/REPLACE_USERNAME/mscafe/frontend;
                    index index.html;
                    try_files $uri $uri/ /index.html;
                    
                    # Cache static assets
                    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                        expires 1y;
                        add_header Cache-Control "public, immutable";
                        access_log off;
                    }
                }
                
                # Proxy API requests to backend
                location /api/ {
                    proxy_pass http://localhost:5000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                    proxy_read_timeout 300s;
                    proxy_connect_timeout 75s;
                }
                
                # Health check endpoint
                location /health {
                    proxy_pass http://localhost:5000/health;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    access_log off;
                }
                
                # Block access to sensitive files
                location ~ /\. {
                    deny all;
                    access_log off;
                    log_not_found off;
                }
            }
            EOF

            # Replace username in config
            sed -i "s/REPLACE_USERNAME/$(whoami)/g" ~/nginx-config/mscafe.conf

            # Verify the config file content
            echo "Nginx config content:"
            cat ~/nginx-config/mscafe.conf | head -20

            # Copy configuration to nginx directory and enable site
            echo "${{ secrets.HOSTINGER_PASSWORD }}" | sudo -S cp ~/nginx-config/mscafe.conf /etc/nginx/sites-available/mscafe
            
            # Remove ALL existing sites first (before enabling new one)
            echo "${{ secrets.HOSTINGER_PASSWORD }}" | sudo -S rm -f /etc/nginx/sites-enabled/*
            
            # Now enable only our site
            echo "${{ secrets.HOSTINGER_PASSWORD }}" | sudo -S ln -sf /etc/nginx/sites-available/mscafe /etc/nginx/sites-enabled/mscafe            # Verify files exist and permissions
            echo "Checking frontend files..."
            ls -la ~/mscafe/frontend/ || echo "Frontend directory not found!"

            # Check which sites are enabled
            echo "Enabled nginx sites:"
            echo "${{ secrets.HOSTINGER_PASSWORD }}" | sudo -S ls -la /etc/nginx/sites-enabled/

            # Test nginx configuration
            echo "${{ secrets.HOSTINGER_PASSWORD }}" | sudo -S nginx -t

            # Restart nginx to apply changes
            echo "${{ secrets.HOSTINGER_PASSWORD }}" | sudo -S systemctl enable nginx
            echo "${{ secrets.HOSTINGER_PASSWORD }}" | sudo -S systemctl restart nginx

            # Verify nginx is running
            sleep 2
            NGINX_STATUS=$(echo "${{ secrets.HOSTINGER_PASSWORD }}" | sudo -S systemctl is-active nginx)

            # Get public IP
            PUBLIC_IP=$(curl -s ifconfig.me 2>/dev/null || curl -s icanhazip.com 2>/dev/null || echo "YOUR_SERVER_IP")

            echo "Deployment completed!"
            echo ""
            echo "🚀 Your application is now running:"
            echo "   Website: http://$PUBLIC_IP/"
            echo "   API: http://$PUBLIC_IP/api/"
            echo "   Backend Direct: http://$PUBLIC_IP:5000"
            echo ""
            echo "📊 Service Status:"
            echo "   PM2: $(pm2 list | grep -o 'online\|stopped\|errored' | head -1 || echo 'checking...')"
            echo "   Nginx: $NGINX_STATUS"
            echo ""
            echo "📊 PM2 Processes:"
            pm2 status
            echo ""
            echo "🔧 Nginx Configuration: /etc/nginx/sites-available/mscafe"
