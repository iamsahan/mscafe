name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - prod
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            Frontend/package-lock.json
            backend/package-lock.json

      - name: Build Frontend
        working-directory: Frontend
        run: |
          npm ci
          npm run build

      - name: Install Backend Dependencies
        working-directory: backend
        run: |
          npm ci --production

      - name: Create Deployment Package
        run: |
          mkdir -p deploy/app
          cp -r Frontend/build deploy/app/frontend
          rsync -av --exclude='node_modules' --exclude='logs' --exclude='uploads' --exclude='.env' backend/ deploy/app/backend/
          mkdir -p deploy/app/backend/logs
          mkdir -p deploy/app/backend/uploads/images/courses
          mkdir -p deploy/app/backend/uploads/images/services
          cp backend/package*.json deploy/app/backend/

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT || 22 }}
          source: "deploy/*"
          target: "/tmp/"
          strip_components: 1
          overwrite: true

      - name: Setup Application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT || 22 }}
          script: |
            echo "Starting deployment..."

            # Install Node.js if needed
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            # Install PM2 globally
            sudo npm install -g pm2

            # Stop existing app
            pm2 stop mscafe-app || true
            pm2 delete mscafe-app || true

            # Backup current app
            if [ -d ~/mscafe ]; then
              rm -rf ~/mscafe_backup
              mv ~/mscafe ~/mscafe_backup
            fi

            # Create application directory
            mkdir -p ~/mscafe

            # Move files from tmp to home directory
            if [ -d /tmp/app ]; then
              cp -r /tmp/app/* ~/mscafe/
              rm -rf /tmp/app
            fi

            # Set proper permissions
            chmod -R 755 ~/mscafe

            # Install production dependencies
            cd ~/mscafe/backend
            npm install --production

            # Copy environment file if exists
            if [ -f ~/mscafe_backup/backend/.env ]; then
              cp ~/mscafe_backup/backend/.env .
            fi

            # Start app with PM2
            pm2 start server.js --name mscafe-app
            pm2 save
            pm2 startup

            # Stop any existing frontend process
            pm2 stop mscafe-frontend || true
            pm2 delete mscafe-frontend || true

            # Check if nginx is installed, install if not
            if ! command -v nginx &> /dev/null; then
              echo "Installing nginx..."
              export DEBIAN_FRONTEND=noninteractive
              sudo apt update
              sudo apt install -y nginx
            fi

            # Create nginx configuration
            sudo tee /etc/nginx/sites-available/mscafe > /dev/null <<'EOF'
            server {
                listen 80;
                listen [::]:80;
                server_name _;
                
                # Serve React frontend
                location / {
                    root /home/USERNAME_PLACEHOLDER/mscafe/frontend;
                    index index.html;
                    try_files $uri $uri/ /index.html;
                    
                    # Cache static assets
                    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                        expires 1y;
                        add_header Cache-Control "public, immutable";
                    }
                }
                
                # Proxy API requests to backend
                location /api/ {
                    proxy_pass http://localhost:5000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                    proxy_read_timeout 300s;
                    proxy_connect_timeout 75s;
                }
                
                # Health check endpoint
                location /health {
                    proxy_pass http://localhost:5000/health;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                }
            }
            EOF

            # Replace username placeholder with actual username
            sudo sed -i "s/USERNAME_PLACEHOLDER/$(whoami)/g" /etc/nginx/sites-available/mscafe

            # Enable the site and disable default
            sudo ln -sf /etc/nginx/sites-available/mscafe /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default

            # Test nginx configuration
            sudo nginx -t

            # Enable and start nginx
            sudo systemctl enable nginx
            sudo systemctl restart nginx

            # Check nginx status
            sudo systemctl status nginx --no-pager -l

            echo "Deployment completed!"
            echo ""
            echo "🚀 Your application is now running:"
            echo "   Website: http://$(curl -s ifconfig.me)/"
            echo "   API: http://$(curl -s ifconfig.me)/api/"
            echo "   Backend Direct: http://$(curl -s ifconfig.me):5000"
            echo ""
            echo "📊 PM2 Status:"
            pm2 status
            echo ""
            echo "📊 Nginx Status:"
            sudo systemctl is-active nginx
