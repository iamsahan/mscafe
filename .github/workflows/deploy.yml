name: Deploy React + Node App to VPS

on:
  push:
    branches:
      - prod # run deploy only when pushing to main branch
  workflow_dispatch: # allow manual trigger from GitHub UII

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js environment (version 20)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Step 3: Build React frontend
      - name: Build React frontend
        working-directory: Frontend
        run: |
          npm ci
          npm run build

      # Step 4: Prepare files for deployment (copy build and backend code)
      - name: Prepare deployment package
        run: |
          mkdir deploy_package
          cp -r Frontend/build deploy_package/frontend_build
          rsync -av --exclude 'node_modules' --exclude '.env' backend/ deploy_package/backend

      # Step 5: Copy files to VPS via SCP
      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "deploy_package/*"
          target: "${{ secrets.TARGET_DIR }}/_tmp_build"
          overwrite: true

      # Step 6: Run deploy script on VPS via SSH
      - name: Run deploy script on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "Starting deployment..."

            # Clean up previous temporary builds (with sudo)
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S rm -rf ${{ secrets.TARGET_DIR }}/_tmp_build_clean

            # Prepare clean directory
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S mkdir -p ${{ secrets.TARGET_DIR }}/_tmp_build_clean
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S cp -r ${{ secrets.TARGET_DIR }}/_tmp_build/* ${{ secrets.TARGET_DIR }}/_tmp_build_clean/

            # Stop the service
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S systemctl stop cafe

            # Backup current deployment
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S rm -rf ${{ secrets.TARGET_DIR }}/backup
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S cp -r ${{ secrets.TARGET_DIR }}/current ${{ secrets.TARGET_DIR }}/backup || true

            # Deploy new files
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S rm -rf ${{ secrets.TARGET_DIR }}/current
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S mv ${{ secrets.TARGET_DIR }}/_tmp_build_clean ${{ secrets.TARGET_DIR }}/current

            # Set permissions
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S chown -R www-data:www-data ${{ secrets.TARGET_DIR }}/current

            # Install backend dependencies
            cd ${{ secrets.TARGET_DIR }}/current/backend
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S npm install --production

            # Start the service
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S systemctl start cafe

            # Clean up temporary files
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S rm -rf ${{ secrets.TARGET_DIR }}/_tmp_build

            echo "Deployment completed!"
